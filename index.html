<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Survivor - Elementalist</title>
    <style>
        /* ================= CSS ================= */
        html, body {
            margin: 0; padding: 0; overflow: hidden;
            background: #111; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas { display: block; }

        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        .hidden { display: none !important; }

        .menu-box {
            background: #222; padding: 40px;
            border-radius: 20px; border: 2px solid #444;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        button {
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            background: #ff0066; color: white; border: none;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        button:hover { background: #ff3385; transform: translateY(-2px); }

        /* HUD & Progress Bars */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none; background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 10px; border: 2px solid #ff0066; }
        #stats { font-size: 16px; font-weight: bold; color: #00ccff; margin-bottom: 10px; }
        .bar-container { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; }
        .bar-label { color: #888; font-size: 12px; min-width: 35px; }
        .bar-bg {
            width: 250px; height: 18px; background: #1a1a1a;
            border-radius: 8px; overflow: hidden; border: 2px solid #555;
        }
        .bar-fill { height: 100%; transition: width 0.05s ease-out; }
        #hud.damaged { animation: damageFlash 0.3s ease-out; }
        @keyframes damageFlash { 0% { background: rgba(255, 0, 102, 0.3); } 100% { background: rgba(0, 0, 0, 0.6); } }

        /* Ability HUD */
        #cooldownHUD { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 12px; z-index: 10; }
        .cd-item {
            background: rgba(20, 20, 20, 0.9); padding: 10px;
            border-radius: 10px; border-bottom: 4px solid; min-width: 120px;
        }
        .cd-bar-bg { width: 100%; height: 4px; background: #333; margin-top: 6px; }
        .cd-bar-fill { height: 100%; background: #fff; }

        /* Level Up Cards */
        .levelUpContainer { display: flex; gap: 20px; margin-top: 20px; }
        .upgradeCard {
            width: 220px; height: 300px; padding: 20px; border-radius: 16px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .upgradeCard:hover { transform: translateY(-15px); border-color: white; }

        /* Rarity Themes */
        .common { background: #2a2a2a; }
        .rare { background: #1a2a4a; border-color: #3366ff; }
        .epic { background: #3a1a4a; border-color: #9933ff; }
        .legendary { background: #4a3a1a; border-color: #ffcc00; }
        .mythic { background: #4a1a1a; border-color: #ff3300; }

        /* Inventory (Pause Menu) */
        #inventoryList { margin: 20px 0; text-align: left; max-height: 200px; overflow-y: auto; width: 100%; }
        .inventory-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; }

        /* Dev Menu */
        #devMenu {
            position: fixed; top: 20px; right: 20px; background: #222;
            padding: 15px; border-radius: 12px; border: 1px solid #ff0066;
            width: 260px; max-height: 80vh; overflow-y: auto; display: none; z-index: 1000;
        }
        .cheatBtn { width: 100%; margin-bottom: 6px; font-size: 12px; padding: 8px; }
        .rarityHeader { color: #666; font-size: 11px; margin: 10px 0 5px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <canvas id="game"></canvas>

    <div id="hud">
        <div id="stats" style="">WAVE: 1 | LVL: 1</div>
        <div class="bar-container">
            <div class="bar-label">HP</div>
            <div class="bar-bg"><div id="hpFill" class="bar-fill" style="background: #ff0066; width: 100%;"></div></div>
        </div>
        <div class="bar-container">
            <div class="bar-label">EXP</div>
            <div class="bar-bg"><div id="expFill" class="bar-fill" style="background: #00ccff; width: 0%;"></div></div>
        </div>
    </div>

    <div id="bossUI" style="display:none; position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10;">
        <div id="bossTypeLabel" style="color: #ffaa00; font-weight: bold; margin-bottom: 5px;">ELITE DETECTED</div>
        <div class="bar-bg" style="width: 50%; height: 16px; margin: 0 auto;">
            <div id="bossBarFill" class="bar-fill" style="background: #ff4400; width: 100%;"></div>
        </div>
    </div>

    <div id="cooldownHUD"></div>

    <div id="overlay" class="overlay">
        <div class="menu-box">
            <h1 style="font-size: 48px; color: #ff0066;">CIRCLE SURVIVOR</h1>
            <p style="color: #888; margin-bottom: 30px;">WASD: Move | Mouse: Aim | Space: Dash | Esc: Pause</p>
            <button id="startBtn">INITIALIZE</button>
        </div>
    </div>

    <div id="levelUpOverlay" class="overlay hidden">
        <h2 style="color: #00ccff; margin-bottom: 20px;">SYSTEM UPGRADE</h2>
        <div id="upgradeContainer" class="levelUpContainer"></div>
    </div>

    <div id="pauseOverlay" class="overlay hidden">
        <div class="menu-box" style="width: 300px;">
            <h2 style="color: #ffaa00;">PAUSED</h2>
            <div id="inventoryList"></div>
            <button id="resumeBtn">RESUME</button>
        </div>
    </div>

    <div id="deathOverlay" class="overlay hidden">
        <div class="menu-box">
            <h1 style="color: #ff0066;">SYSTEM FAILURE</h1>
            <p id="deathStats" style="font-size: 20px; margin-bottom: 30px;"></p>
            <button onclick="location.reload()">REBOOT</button>
        </div>
    </div>

    <div id="devMenu">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="color: #ff0066; margin: 0; font-size: 14px;">CONSOLE OVERRIDE</h3>
            <button id="closeDev" style="padding: 2px 8px; font-size: 10px; background: #444;">X</button>
        </div>
        <button class="cheatBtn" id="cheatLevel">EXP MAX</button>
        <button class="cheatBtn" id="cheatHeal">REPAIR HP</button>
        <button class="cheatBtn" id="cheatSkip">CLEAR WAVE</button>
        <button class="cheatBtn" id="cheatAll">UNLOCK ALL</button>
        <div id="upgradeInjectionList"></div>
    </div>

    <script src="yes.js"></script>
</body>
</html>
